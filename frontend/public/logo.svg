<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" fill="none">
  <!-- Flame glow backdrop -->
  <ellipse cx="30" cy="32" rx="22" ry="24" fill="#F59E0B" opacity="0.08"/>
  
  <!-- Outer flames -->
  <path d="M18 48 Q14 36 20 26 Q18 20 22 14 Q26 22 24 28 Q28 20 30 12 Q32 20 36 28 Q34 22 38 14 Q42 20 40 26 Q46 36 42 48 Z" fill="#DC2626" opacity="0.6"/>
  
  <!-- Middle flames -->
  <path d="M21 48 Q18 38 23 28 Q22 22 26 16 Q28 24 27 30 Q30 22 30 14 Q30 22 33 30 Q32 24 34 16 Q38 22 37 28 Q42 38 39 48 Z" fill="#F59E0B" opacity="0.8"/>
  
  <!-- Inner flames -->
  <path d="M24 48 Q22 40 26 32 Q25 28 28 22 Q30 28 30 18 Q30 28 32 22 Q35 28 34 32 Q38 40 36 48 Z" fill="#FDE68A" opacity="0.9"/>
  
  <!-- Bright core -->
  <path d="M27 48 Q26 42 28 36 Q30 30 30 24 Q30 30 32 36 Q34 42 33 48 Z" fill="white" opacity="0.7"/>
  
  <!-- Sword blade -->
  <path d="M30 6 L27 36 L30 38 L33 36 Z" fill="#CBD5E1" opacity="0.9"/>
  <path d="M30 6 L30 38 L33 36 Z" fill="#94A3B8" opacity="0.7"/>
  
  <!-- Blade edge highlight -->
  <line x1="30" y1="8" x2="28" y2="34" stroke="white" stroke-width="0.5" opacity="0.6"/>
  
  <!-- Sword guard (crossguard) -->
  <rect x="22" y="36" width="16" height="3" rx="1" fill="#F59E0B"/>
  <rect x="22" y="36" width="16" height="1.5" rx="0.5" fill="#FBBF24"/>
  
  <!-- Sword grip -->
  <rect x="28" y="39" width="4" height="8" rx="1" fill="#92400E"/>
  <line x1="28.5" y1="41" x2="31.5" y2="41" stroke="#78350F" stroke-width="0.5"/>
  <line x1="28.5" y1="43" x2="31.5" y2="43" stroke="#78350F" stroke-width="0.5"/>
  <line x1="28.5" y1="45" x2="31.5" y2="45" stroke="#78350F" stroke-width="0.5"/>
  
  <!-- Pommel -->
  <circle cx="30" cy="48.5" r="2" fill="#F59E0B"/>
  <circle cx="30" cy="48.5" r="1" fill="#FBBF24"/>
  
  <!-- Sparks -->
  <circle cx="16" cy="20" r="1" fill="#FDE68A" opacity="0.9"/>
  <circle cx="42" cy="18" r="0.8" fill="#FDE68A" opacity="0.8"/>
  <circle cx="14" cy="30" r="0.6" fill="#FBBF24" opacity="0.7"/>
  <circle cx="46" cy="26" r="0.7" fill="#FDE68A" opacity="0.8"/>
  <circle cx="44" cy="34" r="0.5" fill="#FBBF24" opacity="0.6"/>
  <circle cx="19" cy="14" r="0.5" fill="#FDE68A" opacity="0.7"/>
  <circle cx="40" cy="12" r="0.6" fill="#FDE68A" opacity="0.6"/>
  
  <!-- Company Name -->
  <text x="66" y="30" font-family="'Georgia', 'Times New Roman', serif" font-size="30" font-weight="700" fill="white" letter-spacing="2">TERRA</text>
  <text x="190" y="30" font-family="'Georgia', 'Times New Roman', serif" font-size="30" font-weight="700" fill="#F59E0B" letter-spacing="2">FORGE</text>
  
  <!-- Subtitle -->
  <text x="66" y="48" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#9CA3AF" letter-spacing="4">ENGINEERING</text>
</svg>
