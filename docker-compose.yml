version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: terraforge
      POSTGRES_PASSWORD: terraforge_dev
      POSTGRES_DB: terraforge_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://terraforge:terraforge_dev@db:5432/terraforge_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production

volumes:
  pgdata:
